# yamllint disable rule:line-length
---
wine_install_p7zip: false
wine_install_recommends: false
wine_install_winetricks: false
wine_install_winetricks_dependencies: false
# Stable, devel, or staging (for winehq packages).
wine_release: stable
wine_winetricks_apt_install: false
wine_winetricks_url: https://raw.githubusercontent.com/Winetricks/winetricks/master/src/winetricks
wine_winetricks_winver: win10
is_unix: "{{ ansible_os_family != 'Windows' and not ansible_os_family.startswith('CYGWIN') }}"
platform_name: "{{ 'Windows' if ansible_os_family == 'Windows' else 'Cygwin' if ansible_os_family.startswith('CYGWIN') else ansible_os_family }}"